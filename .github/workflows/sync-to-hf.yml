name: Sync to Hugging Face Space

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://huggingface.co/spaces/wzc183265/health-assessment-api
          git -c http.extraheader="Authorization: Basic $(printf 'wzc183265:%s' "$HF_TOKEN" | base64 -w0)" push space master:master --force
