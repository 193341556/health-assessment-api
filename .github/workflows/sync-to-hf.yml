name: Sync to Hugging Face Space

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://wzc183265:${HF_TOKEN}@huggingface.co/spaces/wzc183265/health-assessment-api
          git push space master:master --force
