<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康测评 - 睿迄科技</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 32px 32px 24px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 14px; }

    .progress-bar {
      height: 4px;
      background: #e0e0e0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.4s ease;
    }

    .form-body { padding: 32px; }

    .step { display: none; }
    .step.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .step-title { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #333; }
    .step-desc { font-size: 14px; color: #666; margin-bottom: 20px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 8px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 16px;
      transition: border-color 0.3s;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: #667eea; }
    .form-group .hint { font-size: 12px; color: #999; margin-top: 6px; }

    .btn-group { display: flex; gap: 12px; margin-top: 32px; }
    .btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .btn-secondary { background: #f0f0f0; color: #666; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .radio-item {
      padding: 16px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .radio-item:hover { border-color: #667eea; }
    .radio-item.selected { border-color: #667eea; background: rgba(102, 126, 234, 0.1); }
    .radio-item input { display: none; }
    .radio-item .icon { font-size: 24px; margin-bottom: 8px; }
    .radio-item .label { font-weight: 500; }

    /* 结果页 */
    .result-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      padding: 24px;
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
    }
    .result-card .bmi-value { font-size: 48px; font-weight: 700; }
    .result-card .bmi-label { font-size: 14px; opacity: 0.9; }
    .result-card .bmi-desc { font-size: 16px; margin-top: 8px; }

    .result-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-item .label { font-size: 14px; color: #666; }
    .result-item .value { font-size: 18px; font-weight: 600; color: #333; }
    .result-item .unit { font-size: 12px; color: #999; }

    .locked-result {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-top: 16px;
      border: 2px dashed #ddd;
    }
    .locked-result .lock-icon { font-size: 32px; margin-bottom: 12px; }
    .locked-result p { color: #666; font-size: 14px; margin-bottom: 16px; }

    .pay-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .pay-btn:hover { transform: translateY(-2px); }

    /* 会员标识 */
    .vip-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .error-msg { color: #e74c3c; font-size: 13px; margin-top: 8px; }

    /* 步骤指示器 */
    .step-indicators {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 20px 32px 0;
    }
    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e0e0e0;
      transition: all 0.3s;
    }
    .step-dot.active { background: #667eea; width: 24px; border-radius: 4px; }
    .step-dot.completed { background: #667eea; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏃 健康测评</h1>
      <p>完成测评，获取您的专属健康方案</p>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="step-indicators" id="stepIndicators"></div>

    <div class="form-body">
      <!-- Step 1: 性别 -->
      <div class="step active" id="step1">
        <div class="step-title">👋 您是？</div>
        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" name="gender" value="male" onclick="selectRadio(this.parentElement, 'gender', 'male')">
            <div class="icon">👨</div>
            <div class="label">男</div>
          </label>
          <label class="radio-item">
            <input type="radio" name="gender" value="female" onclick="selectRadio(this.parentElement, 'gender', 'female')">
            <div class="icon">👩</div>
            <div class="label">女</div>
          </label>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" id="step1Next" disabled onclick="nextStep(1)">下一步</button>
        </div>
      </div>

      <!-- Step 2: 年龄身高 -->
      <div class="step" id="step2">
        <div class="step-title">📋 基本信息</div>
        <div class="form-group">
          <label>年龄</label>
          <input type="number" id="age" placeholder="请输入年龄" min="10" max="100" oninput="validateStep2()">
          <div class="hint">10-100岁</div>
        </div>
        <div class="form-group">
          <label>身高 (cm)</label>
          <input type="number" id="height_cm" placeholder="请输入身高" min="100" max="250" oninput="validateStep2()">
          <div class="hint">100-250cm</div>
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="prevStep(2)">上一步</button>
          <button class="btn btn-primary" id="step2Next" disabled onclick="nextStep(2)">下一步</button>
        </div>
      </div>

      <!-- Step 3: 体重 -->
      <div class="step" id="step3">
        <div class="step-title">⚖️ 体重信息</div>
        <div class="form-group">
          <label>当前体重 (kg)</label>
          <input type="number" id="weight_kg" placeholder="请输入当前体重" min="30" max="300" step="0.1" oninput="validateStep3()">
          <div class="hint">30-300kg</div>
        </div>
        <div class="form-group">
          <label>目标体重 (kg)</label>
          <input type="number" id="target_weight_kg" placeholder="请输入目标体重" min="30" max="300" step="0.1" oninput="validateStep3()">
          <div class="hint">与当前体重差距不超过60%</div>
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="prevStep(3)">上一步</button>
          <button class="btn btn-primary" id="step3Next" disabled onclick="nextStep(3)">下一步</button>
        </div>
      </div>

      <!-- Step 4: 活动水平 -->
      <div class="step" id="step4">
        <div class="step-title">🏃 活动频率</div>
        <div class="step-desc">选择您每周的运动强度</div>
        <div class="radio-group" style="grid-template-columns: 1fr;">
          <label class="radio-item">
            <input type="radio" name="activity_level" value="sedentary" onclick="selectRadio(this.parentElement, 'activity_level', 'sedentary')">
            <div class="icon">🛋️</div>
            <div class="label">久坐不动</div>
            <div class="hint" style="text-align:center">几乎不运动</div>
          </label>
          <label class="radio-item">
            <input type="radio" name="activity_level" value="light" onclick="selectRadio(this.parentElement, 'activity_level', 'light')">
            <div class="icon">🚶</div>
            <div class="label">轻度活动</div>
            <div class="hint" style="text-align:center">每周1-2次运动</div>
          </label>
          <label class="radio-item">
            <input type="radio" name="activity_level" value="moderate" onclick="selectRadio(this.parentElement, 'activity_level', 'moderate')">
            <div class="icon">🏃</div>
            <div class="label">中度活动</div>
            <div class="hint" style="text-align:center">每周3-4次运动</div>
          </label>
          <label class="radio-item">
            <input type="radio" name="activity_level" value="active" onclick="selectRadio(this.parentElement, 'activity_level', 'active')">
            <div class="icon">💪</div>
            <div class="label">高度活动</div>
            <div class="hint" style="text-align:center">每周5次以上运动</div>
          </label>
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="prevStep(4)">上一步</button>
          <button class="btn btn-primary" id="step4Next" disabled onclick="nextStep(4)">下一步</button>
        </div>
      </div>

      <!-- Step 5: 目标 -->
      <div class="step" id="step5">
        <div class="step-title">🎯 健康目标</div>
        <div class="form-group">
          <label>您的目标是？</label>
          <select id="goal" onchange="validateStep5()">
            <option value="">请选择</option>
            <option value="减重">减重</option>
            <option value="增肌">增肌</option>
            <option value="保持">保持体重</option>
            <option value="塑形">塑形</option>
          </select>
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="prevStep(5)">上一步</button>
          <button class="btn btn-primary" id="step5Next" disabled onclick="submitAssessment()">提交测评</button>
        </div>
      </div>

      <!-- Step 6: 结果 -->
      <div class="step" id="step6">
        <div id="resultContent"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api/v1';
    let sessionId = null;
    let currentStep = 1;
    const totalSteps = 5;

    // 防抖定时器
    let debounceTimer = null;
    let pendingSave = null;

    function debounceSave(field, value) {
      clearTimeout(debounceTimer);
      pendingSave = saveField(field, value);
      debounceTimer = setTimeout(() => {
        pendingSave = null;
        saveField(field, value);
      }, 500);
    }

    // 立即冲洗 pending 保存并等待完成
    async function flushSave() {
      clearTimeout(debounceTimer);
      if (pendingSave) {
        await pendingSave;
        pendingSave = null;
      }
    }

    // 初始化
    async function init() {
      try {
        // 尝试恢复已存在的 session
        const savedSessionId = localStorage.getItem('session_id');
        if (savedSessionId) {
          const res = await fetch(API_BASE + '/assessment/' + savedSessionId);
          if (res.ok) {
            const data = await res.json();
            if (data.status === 'completed') {
              // 已完成，直接显示结果
              sessionId = savedSessionId;
              showStep(6);
              loadResult();
              return;
            } else if (data.current_step) {
              // 恢复到之前的步骤
              sessionId = savedSessionId;
              currentStep = data.current_step;
              renderStepIndicators();
              updateProgress();
              showStep(currentStep);
              // 回填已填数据
              if (data.gender) {
                const el = document.querySelector(`input[name="gender"][value="${data.gender}"]`);
                if (el) selectRadio(el.parentElement, 'gender', data.gender);
              }
              if (data.age) document.getElementById('age').value = data.age;
              if (data.height_cm) document.getElementById('height_cm').value = data.height_cm;
              if (data.weight_kg) document.getElementById('weight_kg').value = data.weight_kg;
              if (data.target_weight_kg) document.getElementById('target_weight_kg').value = data.target_weight_kg;
              if (data.activity_level) {
                const al = document.querySelector(`input[name="activity_level"][value="${data.activity_level}"]`);
                if (al) selectRadio(al.parentElement, 'activity_level', data.activity_level);
              }
              if (data.goal) {
                const el = document.querySelector(`#goal option[value="${data.goal}"]`);
                if (el) el.selected = true;
              }
              validateStep2();
              validateStep3();
              validateStep4();
              validateStep5();
              return;
            }
          }
        }
        // 无 session 或已过期，创建新的
        const res = await fetch(API_BASE + '/assessment', { method: 'POST' });
        const data = await res.json();
        sessionId = data.session_id;
        localStorage.setItem('session_id', sessionId);
        updateProgress();
        renderStepIndicators();
      } catch (e) {
        alert('初始化失败，请刷新重试');
      }
    }

    function renderStepIndicators() {
      const container = document.getElementById('stepIndicators');
      container.innerHTML = '';
      for (let i = 1; i <= totalSteps; i++) {
        const dot = document.createElement('div');
        dot.className = 'step-dot' + (i === 1 ? ' active' : '');
        container.appendChild(dot);
      }
    }

    function updateProgress() {
      const pct = ((currentStep - 1) / totalSteps) * 100;
      document.getElementById('progressFill').style.width = pct + '%';

      const dots = document.querySelectorAll('.step-dot');
      dots.forEach((dot, i) => {
        dot.className = 'step-dot';
        if (i + 1 < currentStep) dot.classList.add('completed');
        else if (i + 1 === currentStep) dot.classList.add('active');
      });
    }

    function selectRadio(el, field, value) {
      el.parentElement.querySelectorAll('.radio-item').forEach(item => item.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;

      if (field === 'gender') document.getElementById('step1Next').disabled = false;
      if (field === 'activity_level') document.getElementById('step4Next').disabled = false;

      debounceSave(field, value);
    }

    async function saveField(field, value) {
      if (!sessionId) return;
      const body = { [field]: value, current_step: currentStep };
      try {
        await fetch(API_BASE + '/assessment/' + sessionId, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
      } catch (e) {
        console.error('保存失败', e);
      }
    }

    function validateStep2() {
      const age = document.getElementById('age').value;
      const h = document.getElementById('height_cm').value;
      const valid = age >= 10 && age <= 100 && h >= 100 && h <= 250;
      document.getElementById('step2Next').disabled = !valid;
      if (valid) debounceSave('age', parseInt(age));
      if (valid) debounceSave('height_cm', parseInt(h));
    }

    function validateStep3() {
      const w = parseFloat(document.getElementById('weight_kg').value);
      const t = parseFloat(document.getElementById('target_weight_kg').value);
      const valid = w >= 30 && w <= 300 && t >= 30 && t <= 300 && Math.abs(w - t) / w <= 0.6;
      document.getElementById('step3Next').disabled = !valid;
      if (valid) debounceSave('weight_kg', w);
      if (valid) debounceSave('target_weight_kg', t);
    }

    function validateStep5() {
      const goal = document.getElementById('goal').value;
      document.getElementById('step5Next').disabled = !goal;
      if (goal) debounceSave('goal', goal);
    }

    function showStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
      currentStep = n;
      updateProgress();
    }

    async function nextStep(n) {
      await flushSave();
      showStep(n + 1);
    }

    function prevStep(n) {
      showStep(n - 1);
    }

    async function submitAssessment() {
      await flushSave();
      const btn = document.getElementById('step5Next');
      btn.disabled = true;
      btn.textContent = '计算中...';

      try {
        const res = await fetch(API_BASE + '/assessment/' + sessionId + '/submit', { method: 'POST' });
        const data = await res.json();

        if (!res.ok) {
          alert(data.error || '提交失败');
          btn.disabled = false;
          btn.textContent = '提交测评';
          return;
        }

        showStep(6);
        loadResult();
      } catch (e) {
        alert('提交失败，请重试');
        btn.disabled = false;
        btn.textContent = '提交测评';
      }
    }

    async function loadResult() {
      const res = await fetch(API_BASE + '/result/' + sessionId);
      const data = await res.json();
      const isVip = data.recommended_intake_kcal !== null;

      let html = '';

      if (isVip) {
        html += '<div class="vip-badge">⭐ 会员专属报告</div>';
      }

      html += `
        <div class="result-card">
          <div class="bmi-label">您的 BMI</div>
          <div class="bmi-value">${typeof data.bmi === 'number' ? data.bmi.toFixed(1) : '--'}</div>
          <div class="bmi-desc">${data.bmi_category || getBmiDesc(data.bmi)}</div>
        </div>
      `;

      if (isVip) {
        html += `
          <div class="result-item">
            <div>
              <div class="label">基础代谢率 BMR</div>
              <div class="unit">躺平一天消耗</div>
            </div>
            <div>
              <div class="value">${data.bmr}</div>
              <div class="unit">千卡/天</div>
            </div>
          </div>
          <div class="result-item">
            <div>
              <div class="label">每日总消耗 TDEE</div>
              <div class="unit">含活动水平</div>
            </div>
            <div>
              <div class="value">${data.tdee}</div>
              <div class="unit">千卡/天</div>
            </div>
          </div>
          <div class="result-item">
            <div>
              <div class="label">每日推荐摄入</div>
              <div class="unit">根据目标计算</div>
            </div>
            <div>
              <div class="value">${data.recommended_intake_kcal}</div>
              <div class="unit">千卡/天</div>
            </div>
          </div>
          <div class="result-item">
            <div>
              <div class="label">预计目标日期</div>
              <div class="unit">每周减重0.75kg</div>
            </div>
            <div>
              <div class="value">${formatDate(data.target_date)}</div>
              <div class="unit">达成目标</div>
            </div>
          </div>
          <div class="result-item">
            <div>
              <div class="label">三大营养素</div>
              <div class="unit">蛋白质/碳水/脂肪</div>
            </div>
            <div>
              <div class="value">${data.macros.protein_g}g / ${data.macros.carbs_g}g / ${data.macros.fat_g}g</div>
              <div class="unit">每日摄入</div>
            </div>
          </div>
        `;

        // 风险提示
        if (data.health_risks && data.health_risks.length > 0) {
          html += `<div class="result-item" style="flex-direction:column;align-items:flex-start">
            <div class="label" style="margin-bottom:6px">⚠️ 健康提示</div>
            ${data.health_risks.map(r => `<div style="font-size:13px;color:#e74c3c;margin:2px 0">${r}</div>`).join('')}
          </div>`;
        }

        // 运动建议
        if (data.exercise_advice) {
          html += `<div class="result-item" style="flex-direction:column;align-items:flex-start">
            <div class="label" style="margin-bottom:6px">🏃 运动建议</div>
            <div style="font-size:14px;color:#333">${data.exercise_advice}</div>
          </div>`;
        }

        // 每周曲线
        if (data.weekly_targets && data.weekly_targets.length > 0) {
          html += `<div class="result-item" style="flex-direction:column;align-items:flex-start">
            <div class="label" style="margin-bottom:8px">📈 每周目标体重曲线</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              ${data.weekly_targets.map((w, i) => `<div style="background:#f0f0f0;padding:6px 10px;border-radius:8px;font-size:13px">第${i+1}周<br><strong>${w}kg</strong></div>`).join('')}
            </div>
          </div>`;
        }
      } else {
        html += `
          <div class="locked-result">
            <div class="lock-icon">🔒</div>
            <p>开通会员解锁完整报告<br>包含BMR/TDEE/热量/曲线/风险/建议</p>
            <button class="pay-btn" onclick="doPay()">开通会员 ￥9.9</button>
          </div>
        `;
      }

      document.getElementById('resultContent').innerHTML = html;
    }

    async function doPay() {
      const btn = document.querySelector('.pay-btn');
      btn.disabled = true;
      btn.textContent = '支付中...';

      try {
        const res = await fetch(API_BASE + '/pay/' + sessionId, { method: 'POST' });
        const data = await res.json();

        if (data.status === 'active') {
          loadResult();
        } else {
          alert('支付失败');
          btn.disabled = false;
          btn.textContent = '开通会员 ￥9.9';
        }
      } catch (e) {
        alert('支付失败');
        btn.disabled = false;
        btn.textContent = '开通会员 ￥9.9';
      }
    }

    function getBmiDesc(bmi) {
      if (bmi < 18.5) return '体重过轻';
      if (bmi < 24) return '体重正常';
      if (bmi < 28) return '超重';
      return '肥胖';
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
    }

    // 启动
    init();
  </script>
